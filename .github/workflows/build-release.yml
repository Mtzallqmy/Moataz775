name: Build and release Moataz Dow

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: App version without the v prefix
        required: false
        default: 1.0.0-dev

permissions:
  contents: write

concurrency:
  group: moataz-dow-${{ github.ref }}
  cancel-in-progress: true

env:
  UPSTREAM_REPOSITORY: https://github.com/TeamNewPipe/NewPipe.git
  UPSTREAM_REF: v0.28.8

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout customization repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager 'platforms;android-36' 'build-tools;36.0.0'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="1.0.0-dev.${GITHUB_RUN_NUMBER}"
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Fetch pinned NewPipe source
        run: git clone --depth 1 --branch "$UPSTREAM_REF" "$UPSTREAM_REPOSITORY" build/NewPipe

      - name: Apply Moataz Dow overlay
        run: python3 scripts/prepare-source.py --source build/NewPipe --version '${{ steps.version.outputs.value }}'

      - name: Validate release signing secrets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64" || { echo 'Missing ANDROID_KEYSTORE_BASE64'; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo 'Missing ANDROID_KEYSTORE_PASSWORD'; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo 'Missing ANDROID_KEY_ALIAS'; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo 'Missing ANDROID_KEY_PASSWORD'; exit 1; }
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/moataz-dow-release.jks"

      - name: Create temporary CI signing key
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          keytool -genkeypair -noprompt \
            -keystore "$RUNNER_TEMP/moataz-dow-release.jks" \
            -storepass ci-password \
            -keypass ci-password \
            -alias moataz-ci \
            -keyalg RSA -keysize 3072 -validity 30 \
            -dname "CN=Moataz Dow CI,O=Moataz Dow,C=YE"

      - name: Build APKs
        working-directory: build/NewPipe
        env:
          MOATAZ_KEYSTORE_PATH: ${{ runner.temp }}/moataz-dow-release.jks
          MOATAZ_KEYSTORE_PASSWORD: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.ANDROID_KEYSTORE_PASSWORD || 'ci-password' }}
          MOATAZ_KEY_ALIAS: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.ANDROID_KEY_ALIAS || 'moataz-ci' }}
          MOATAZ_KEY_PASSWORD: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.ANDROID_KEY_PASSWORD || 'ci-password' }}
        shell: bash
        run: ./gradlew --no-daemon --stacktrace assembleRelease

      - name: Collect and verify APKs
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail
          VARIANT=release
          OUT=dist
          mkdir -p "$OUT"
          ARM64=$(find build/NewPipe/app/build/outputs/apk -type f -name "*arm64-v8a*-${VARIANT}.apk" | head -1)
          UNIVERSAL=$(find build/NewPipe/app/build/outputs/apk -type f -name "*universal*-${VARIANT}.apk" | head -1)
          test -f "$ARM64"
          test -f "$UNIVERSAL"
          cp "$ARM64" "$OUT/Moataz-Dow-${{ steps.version.outputs.value }}-arm64-v8a.apk"
          cp "$UNIVERSAL" "$OUT/Moataz-Dow-${{ steps.version.outputs.value }}-universal.apk"
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -1)
          "$APKSIGNER" verify --verbose "$OUT/Moataz-Dow-${{ steps.version.outputs.value }}-arm64-v8a.apk"
          "$APKSIGNER" verify --verbose "$OUT/Moataz-Dow-${{ steps.version.outputs.value }}-universal.apk"
          (cd "$OUT" && sha256sum *.apk > SHA256SUMS.txt)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: moataz-dow-${{ steps.version.outputs.value }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Moataz Dow ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.apk
            dist/SHA256SUMS.txt
          body: |
            ## Moataz Dow ${{ steps.version.outputs.value }}

            - **arm64-v8a:** smaller APK for modern 64-bit Android devices.
            - **universal:** broader device compatibility.
            - APK signatures are produced with the private release key stored in GitHub Actions secrets.
            - SHA-256 checksums are attached for verification.
